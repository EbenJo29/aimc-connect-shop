<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMC Connect</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#08306b;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
}

.hero{
    text-align:center;
    padding:40px;
    background:white;
}

.categories{
    padding:30px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}
</style>

</head>

<body>

<header>
    <h1>AIMC Connect</h1>
    <p>Your Digital Marketplace</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Categories</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h2>Welcome to AIMC Connect</h2>
    <p>Buy, Sell and Connect</p>
</div>

<div class="categories">
    <h2>Our Categories</h2>

    <div class="grid">
        <div class="card">🏠 Real Estate</div>
        <div class="card">🌾 Agro Products</div>
        <div class="card">🚗 Automobiles</div>
        <div class="card">💻 Electronics</div>
    </div>
</div>

</body>
</html>
